<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperRobots - Super Robots Game</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #f8fafc;
        }

        .layout-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1rem;
            gap: 1rem;
        }

        /* LEFT PANEL: CODE EDITOR */
        .editor-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            max-width: 400px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .editor-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .blocks-palette {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .block-btn {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            padding: 0.8rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .block-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        .block-btn:active {
            transform: translateY(0);
        }

        .code-sequence-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .code-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            font-size: 0.95rem;
            animation: slideIn 0.2s ease-out;
            border-left: 4px solid #38bdf8;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .code-item.dragging {
            opacity: 0.5;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
            border-left: 4px solid #f59e0b;
        }

        .code-item.drag-over {
            background: rgba(56, 189, 248, 0.2);
            border-top: 3px solid #38bdf8;
            padding-top: calc(0.6rem - 3px);
            transform: translateY(2px);
            transition: all 0.2s;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            margin-left: 10px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .run-btn {
            flex: 2;
            background: #22c55e;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
            transition: all 0.2s;
        }

        .run-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .reset-btn {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #94a3b8;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* RIGHT PANEL: SIMULATION */
        .simulation-panel {
            flex: 2;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        .canvas-container {
            background: #cbd5e1;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 4px solid #475569;
        }

        canvas {
            display: block;
        }

        .status-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-overlay.visible {
            opacity: 1;
        }

        .status-overlay.success { color: #4ade80; }
        .status-overlay.error { color: #f87171; }

    </style>
</head>
<body>
    <!-- Custom Prompt Modal -->
    <div id="custom-prompt" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; justify-content:center; align-items:center;">
        <div style="background:#1e293b; padding:2rem; border-radius:12px; border: 1px solid #38bdf8; color:white; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h3 style="margin-top:0;">How many times to repeat?</h3>
            <input type="number" id="repeat-input" value="3" min="1" max="99" style="padding:0.5rem; font-size:1.2rem; width:100px; text-align:center; border-radius:6px; border:1px solid #94a3b8; background:#0f172a; color:white; margin-bottom:1rem;">
            <div style="display:flex; gap:1rem; justify-content:center;">
                <button onclick="submitPrompt()" style="background:#22c55e; color:white; border:none; padding:0.6rem 1.2rem; border-radius:6px; font-weight:bold; cursor:pointer; font-size:1rem;">OK</button>
                <button onclick="cancelPrompt()" style="background:#ef4444; color:white; border:none; padding:0.6rem 1.2rem; border-radius:6px; font-weight:bold; cursor:pointer; font-size:1rem;">Cancel</button>
            </div>
        </div>
    </div>
    <header>
        <h1>Super Robots Game</h1>
        <a href="team.html" class="back-link">👥 SuperRobots Team</a>
    </header>

    <div class="layout-container">
        
        <!-- Code Editor workspace -->
        <div class="editor-panel">
            <div class="editor-header">

                <div style="display:flex; gap: 0.5rem; align-items: center;">
                    <span id="block-limit" style="display:none; color: #f87171; font-weight: bold; background: rgba(255,255,255,0.1); padding: 0.3rem 0.6rem; border-radius: 6px;">Blocks: 0/10</span>
                    <span id="star-score" style="display:none; color: #fbbf24; font-weight: bold; background: rgba(255,255,255,0.1); padding: 0.3rem 0.6rem; border-radius: 6px;">⭐ 0/0</span>
                    <select id="level-selector" onchange="changeLevel(this.value)" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 0.3rem 0.8rem; border-radius: 6px; font-weight: 600; cursor: pointer; outline: none; appearance: auto; -webkit-appearance: auto;">
                    </select>
                </div>
            </div>
            
            <div id="level-intro-text" style="background: rgba(56, 189, 248, 0.1); border-left: 4px solid #38bdf8; padding: 0.6rem 0.8rem; border-radius: 4px; font-size: 0.85rem; color: #bae6fd; margin-bottom: 1rem; line-height: 1.4;">
                Welcome! Reach the goal flag 🏁 to win.
            </div>

            <div class="blocks-palette" id="blocks-palette">
                <!-- Commands will be dynamically generated here -->
            </div>

            <h3 style="margin: 0 0 10px 0; font-size: 1rem; color: #94a3b8;">Your Code Sequence:</h3>
            <div class="code-sequence-container" id="code-list">
                <!-- Commands will be injected here -->
            </div>

            <div class="controls">
                <button class="reset-btn" onclick="clearCode()">Clear Code</button>
                <button class="run-btn" id="runBtn" onclick="runCode()">▶ Run Code</button>
            </div>
        </div>

        <!-- Simulation Viewer -->
        <div class="simulation-panel">
            <div id="status" class="status-overlay"></div>
            <div class="canvas-container">
                <canvas id="simCanvas" width="500" height="500"></canvas>
            </div>
        </div>

    </div>

                introText: "Mixed logic: Use nested loops and if statements.",
                gridSize: 9,
                availableBlocks: ['turnRight', 'turnLeft', 'moveForward', 'whileClear', 'endWhile', 'ifBlocked', 'endIf', 'jump', 'smash', 'repeat', 'endRepeat'],
                start: {x: 0, y: 8}, direction: 1,
                goal: {x: 8, y: 0},
                obstacles: [
                    {x: 2, y: 8}, {x: 4, y: 8}, {x: 6, y: 8},
                    {x: 8, y: 6}, {x: 8, y: 4}, {x: 8, y: 2}
                ],
                breakables: [{x: 8, y: 7}, {x: 8, y: 5}, {x: 8, y: 3}, {x: 8, y: 1}],
                stars: [{x: 8, y: 8}, {x: 0, y: 0}]
            },
            {
                introText: "The big grid! Automation is heavily recommended to save time.",
                gridSize: 14,
                availableBlocks: ['turnLeft', 'turnRight', 'moveForward', 'whileClear', 'endWhile'],
                start: {x: 13, y: 13}, direction: 3,
                goal: {x: 0, y: 0},
                obstacles: [
                    {x: 0, y: 13}, {x: 1, y: 13}, {x: 2, y: 13}, {x: 3, y: 13}, {x: 4, y: 13}, {x: 5, y: 13}, {x: 6, y: 13},
                    {x: 0, y: 12}, {x: 0, y: 11}, {x: 0, y: 10}, {x: 0, y: 9}, {x: 0, y: 8}, {x: 0, y: 7}, {x: 0, y: 6}
                ]
            },
            {
                introText: "Master of Logic! Use Repeat and If to smash your way across the L-shaped path. Precision is key!",
                gridSize: 12,
                maxBlocks: 14,
                availableBlocks: ['turnLeft', 'turnRight', 'moveForward', 'ifBlocked', 'endIf', 'smash', 'repeat', 'endRepeat'],
                start: {x: 0, y: 11}, direction: 1,
                goal: {x: 11, y: 0},
                obstacles: [],
                breakables: [
                    {x: 4, y: 11}, {x: 8, y: 11},
                    {x: 11, y: 7}, {x: 11, y: 3}
                ],
                stars: []
            }
        ];

        let currentLevel = 0;
        let robot;
        let mapData;
        let activeStars = [];
        let activeBreakables = [];
        let totalStars = 0;

        function updateStarUI() {
            let el = document.getElementById('star-score');
            if(totalStars > 0) {
                el.style.display = 'inline-block';
                el.innerText = `⭐ ${totalStars - activeStars.length} / ${totalStars}`;
            } else {
                el.style.display = 'none';
            }
        }

        function updateBlockUI() {
            let el = document.getElementById('block-limit');
            if (mapData && mapData.maxBlocks) {
                el.style.display = 'inline-block';
                el.innerText = `Blocks: ${commands.length} / ${mapData.maxBlocks}`;
                if (commands.length > mapData.maxBlocks) {
                    el.style.color = '#ef4444'; // Red
                } else {
                    el.style.color = '#f87171';
                }
            } else {
                el.style.display = 'none';
            }
        }

        function loadLevel() {
            mapData = levels[currentLevel];
            gridSize = mapData.gridSize;
            tileSize = canvas.width / gridSize;
            
            robot = {
                x: mapData.start.x,
                y: mapData.start.y,
                dir: mapData.direction
            };
            const selector = document.getElementById('level-selector');
            if (selector) selector.value = currentLevel;

            let introEl = document.getElementById('level-intro-text');
            if (introEl) introEl.innerText = mapData.introText || '';
            
            renderPalette();
            resetSimulation();
        }

        function initLevels() {
            const selector = document.getElementById('level-selector');
            selector.innerHTML = '';
            
            let groupBeginner = document.createElement('optgroup');
            groupBeginner.label = "Beginner";
            let groupIntermediate = document.createElement('optgroup');
            groupIntermediate.label = "Intermediate";
            
            levels.forEach((l, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `Level ${i + 1}`;
                opt.style.color = 'black';
                if (i < 10) {
                    groupBeginner.appendChild(opt);
                } else {
                    groupIntermediate.appendChild(opt);
                }
            });
            selector.appendChild(groupBeginner);
            selector.appendChild(groupIntermediate);
        }

        function changeLevel(idx) {
            if (isRunning) {
                document.getElementById('level-selector').value = currentLevel;
                return;
            }
            currentLevel = parseInt(idx);
            commands = [];
            renderCodeList();
            loadLevel();
        }

        function renderPalette() {
            const palette = document.getElementById('blocks-palette');
            palette.innerHTML = '';
            mapData.availableBlocks.forEach(blockKey => {
                const btn = document.createElement('button');
                btn.className = 'block-btn';
                btn.onclick = () => addCommand(blockKey);
                btn.innerText = allBlocks[blockKey];
                palette.appendChild(btn);
            });
        }

        // Palette & Code Sequence Logic
        function submitPrompt() {
            let val = document.getElementById('repeat-input').value;
            let times = parseInt(val);
            if (!isNaN(times) && times > 0) {
                commands.push(`repeat:${times}`);
                renderCodeList();
                updateBlockUI();
            }
            document.getElementById('custom-prompt').style.display = 'none';
        }

        function cancelPrompt() {
            document.getElementById('custom-prompt').style.display = 'none';
        }

        function addCommand(cmdStr) {
            if (isRunning) return;
            if (mapData && mapData.maxBlocks && commands.length >= mapData.maxBlocks) {
                alert(`Block limit reached for this level! (Max ${mapData.maxBlocks} blocks)`);
                return;
            }
            if (cmdStr === 'repeat') {
                document.getElementById('custom-prompt').style.display = 'flex';
                document.getElementById('repeat-input').focus();
            } else if (cmdStr === 'endRepeat') {
                commands.push('endRepeat');
                renderCodeList();
                updateBlockUI();
            } else {
                commands.push(cmdStr);
                renderCodeList();
                updateBlockUI();
            }
        }

        function removeCommand(index) {
            if (isRunning) return;
            commands.splice(index, 1);
            renderCodeList();
            updateBlockUI();
        }

        function clearCode() {
            if (isRunning) return;
            commands = [];
            renderCodeList();
            updateBlockUI();
            resetSimulation();
        }

        function resetSimulation() {
            robot.x = mapData.start.x;
            robot.y = mapData.start.y;
            robot.dir = mapData.direction;
            activeStars = mapData.stars ? JSON.parse(JSON.stringify(mapData.stars)) : [];
            activeBreakables = mapData.breakables ? JSON.parse(JSON.stringify(mapData.breakables)) : [];
            totalStars = activeStars.length;
            updateStarUI();
            updateBlockUI();
            hideStatus();
            draw();
        }

        let draggedItemIndex = null;

        function handleDragStart(e) {
            if (isRunning) { e.preventDefault(); return; }
            draggedItemIndex = parseInt(this.dataset.index);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.index); // Firefox requires data to drag
            setTimeout(() => this.classList.add('dragging'), 0);
        }

        function handleDragOver(e) {
            if (isRunning) return false;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            if (isRunning) return;
            if (draggedItemIndex !== null && parseInt(this.dataset.index) !== draggedItemIndex) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.stopPropagation();
            if (isRunning || draggedItemIndex === null) return false;
            
            let targetIndex = parseInt(this.dataset.index);
            
            if (draggedItemIndex !== targetIndex) {
                let item = commands.splice(draggedItemIndex, 1)[0];
                commands.splice(targetIndex, 0, item);
                renderCodeList(); // re-render will clean up styles
            } else {
                this.classList.remove('drag-over');
                this.classList.remove('dragging');
            }
            updateBlockUI();
            return false;
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            let items = document.querySelectorAll('.code-item');
            items.forEach(item => item.classList.remove('drag-over'));
            draggedItemIndex = null;
        }

        function renderCodeList() {
            codeList.innerHTML = '';
            let indent = 0;
            commands.forEach((cmd, i) => {
                const div = document.createElement('div');
                div.className = 'code-item';
                div.draggable = true;
                div.dataset.index = i;
                
                div.addEventListener('dragstart', handleDragStart);
                div.addEventListener('dragover', handleDragOver);
                div.addEventListener('dragenter', handleDragEnter);
                div.addEventListener('dragleave', handleDragLeave);
                div.addEventListener('drop', handleDrop);
                div.addEventListener('dragend', handleDragEnd);
                
                let label = '';
                let currentIndent = indent;
                
                if(cmd === 'moveForward') label = '↑ Move Forward();';
                else if(cmd === 'moveBackward') label = '↓ Move Backward();';
                else if(cmd === 'turnLeft') label = '↺ Turn Left();';
                else if(cmd === 'turnRight') label = '↻ Turn Right();';
                else if(cmd === 'jump') label = '⇈ Jump();';
                else if(cmd === 'uTurn') label = '↵ U-Turn();';
                else if(cmd === 'smash') label = '💥 Smash();';
                else if(cmd === 'wait') label = '💤 Wait();';
                else if(cmd.startsWith('repeat:')) {
                    let times = cmd.split(':')[1];
                    label = `⟳ Repeat ${times} times:`;
                    currentIndent = indent;
                    indent++; 
                }
                else if(cmd === 'endRepeat') {
                    indent = Math.max(0, indent - 1);
                    currentIndent = indent;
                    label = '⤶ End Repeat';
                }
                else if(cmd === 'whileClear') {
                    label = `🔁 While Path Clear:`;
                    currentIndent = indent;
                    indent++; 
                }
                else if(cmd === 'endWhile') {
                    indent = Math.max(0, indent - 1);
                    currentIndent = indent;
                    label = '⤶ End While';
                }
                else if(cmd === 'ifBlocked') {
                    label = `🚫 If Obstacle Ahead:`;
                    currentIndent = indent;
                    indent++; 
                }
                else if(cmd === 'endIf') {
                    indent = Math.max(0, indent - 1);
                    currentIndent = indent;
                    label = '⤶ End If';
                }

                div.style.marginLeft = (currentIndent * 20) + 'px';
                // Cursor visual for drag
                div.style.cursor = isRunning ? 'default' : 'grab';

                div.innerHTML = `
                    <span style="pointer-events:none;">${i+1}. ${label}</span>
                    <button class="delete-btn" onclick="removeCommand(${i})">✕</button>
                `;
                codeList.appendChild(div);
            });
            codeList.scrollTop = codeList.scrollHeight; // Auto scroll to bottom
        }

        function isPathClearAhead() {
            let dx = 0, dy = 0;
            if (robot.dir === 0) dy = -1;
            if (robot.dir === 1) dx = 1;
            if (robot.dir === 2) dy = 1;
            if (robot.dir === 3) dx = -1;
            let nx = robot.x + dx;
            let ny = robot.y + dy;
            if (nx < 0 || nx >= gridSize || ny < 0 || ny >= gridSize) return false;
            
            if (mapData.obstacles) {
                for (let obs of mapData.obstacles) {
                    if (obs.x === nx && obs.y === ny) return false;
                }
            }
            for (let obs of activeBreakables) {
                if (obs.x === nx && obs.y === ny) return false;
            }
            return true;
        }

        function getExecutionAST() {
            function parse(startIndex) {
                let seq = [];
                let j = startIndex;
                while (j < commands.length) {
                    let cmd = commands[j];
                    if (cmd.startsWith('repeat:')) {
                        let times = parseInt(cmd.split(':')[1]);
                        let inner = parse(j + 1);
                        seq.push({ type: 'repeat', times: times, body: inner.seq, uiIdx: j, endIdx: inner.endIndex });
                        j = inner.endIndex + 1;
                    } else if (cmd === 'whileClear') {
                        let inner = parse(j + 1);
                        seq.push({ type: 'whileClear', body: inner.seq, uiIdx: j, endIdx: inner.endIndex });
                        j = inner.endIndex + 1;
                    } else if (cmd === 'ifBlocked') {
                        let inner = parse(j + 1);
                        seq.push({ type: 'ifBlocked', body: inner.seq, uiIdx: j, endIdx: inner.endIndex });
                        j = inner.endIndex + 1;
                    } else if (cmd === 'endRepeat' || cmd === 'endWhile' || cmd === 'endIf') {
                        return { seq: seq, endIndex: j };
                    } else {
                        seq.push({ type: 'action', cmd: cmd, uiIdx: j });
                        j++;
                    }
                }
                return { seq: seq, endIndex: j };
            }
            return parse(0).seq;
        }

        // Simulation Execution
        async function runCode() {
            if (isRunning || commands.length === 0) return;
            isRunning = true;
            runBtn.disabled = true;
            runBtn.style.opacity = '0.5';
            hideStatus();
            resetSimulation();

            let codeItems = document.querySelectorAll('.code-item');
            let ast = getExecutionAST();
            
            let successRun = true;
            let goalReached = false;

            async function execNode(node) {
                if (!isRunning) return false;
                
                // Highlight
                codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
                if (node.uiIdx != null && node.uiIdx < codeItems.length) {
                    codeItems[node.uiIdx].style.borderLeftColor = '#fbbf24';
                }
                
                if (node.type === 'action') {
                    await new Promise(r => setTimeout(r, 600));
                    let success = executeCommand(node.cmd);
                    draw();
                    if (!success) {
                        showStatus("Error: Crashed into obstacle or wall!", "error");
                        return false; 
                    }
                    if (checkGoal()) return 'goal';
                    return true;
                } else if (node.type === 'repeat') {
                    await new Promise(r => setTimeout(r, 300));
                    for (let t = 0; t < node.times; t++) {
                        for (let child of node.body) {
                            let res = await execNode(child);
                            if (res === false || res === 'goal') return res;
                        }
                    }
                    if (node.endIdx < codeItems.length) {
                        codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
                        codeItems[node.endIdx].style.borderLeftColor = '#fbbf24';
                        await new Promise(r => setTimeout(r, 300));
                    }
                    return true;
                } else if (node.type === 'whileClear') {
                     await new Promise(r => setTimeout(r, 300));
                     while (isPathClearAhead()) {
                          for (let child of node.body) {
                              let res = await execNode(child);
                              if (res === false || res === 'goal') return res;
                          }
                          if (!isRunning) return false;
                          codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
                          if (node.uiIdx < codeItems.length) codeItems[node.uiIdx].style.borderLeftColor = '#fbbf24';
                          await new Promise(r => setTimeout(r, 300));
                     }
                     if (node.endIdx < codeItems.length) {
                         codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
                         codeItems[node.endIdx].style.borderLeftColor = '#fbbf24';
                         await new Promise(r => setTimeout(r, 300));
                     }
                     return true;
                } else if (node.type === 'ifBlocked') {
                     await new Promise(r => setTimeout(r, 300));
                     if (!isPathClearAhead()) {
                          for (let child of node.body) {
                              let res = await execNode(child);
                              if (res === false || res === 'goal') return res;
                          }
                     }
                     if (node.endIdx < codeItems.length) {
                         codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
                         codeItems[node.endIdx].style.borderLeftColor = '#fbbf24';
                         await new Promise(r => setTimeout(r, 300));
                     }
                     return true;
                }
            }

            for (let node of ast) {
                let res = await execNode(node);
                if (res === false) { successRun = false; break; }
                if (res === 'goal') { goalReached = true; break; }
            }

            codeItems.forEach(el => el.style.borderLeftColor = 'transparent');
            
            if (successRun && goalReached) {
                showStatus("Success! Goal Reached!", "success");
                setTimeout(() => {
                    if (currentLevel < levels.length - 1) {
                        currentLevel++;
                        commands = [];
                        renderCodeList();
                        loadLevel();
                    } else {
                        showStatus("You beat all levels!", "success");
                    }
                }, 2000);
            } else if (isRunning && !goalReached && commands.length > 0) {
                let crashed = statusEl.classList.contains('error');
                if (!crashed) {
                    showStatus("Code finished. Goal not reached.", "error");
                }
            }

            isRunning = false;
            runBtn.disabled = false;
            runBtn.style.opacity = '1';
        }

        function executeCommand(cmd) {
            if (cmd === 'wait') return true;

            let dx = 0, dy = 0;
            if (robot.dir === 0) dy = -1; // Up
            if (robot.dir === 1) dx = 1;  // Right
            if (robot.dir === 2) dy = 1;  // Down
            if (robot.dir === 3) dx = -1; // Left

            if (cmd === 'turnLeft') {
                robot.dir = (robot.dir + 3) % 4;
                return true;
            }
            if (cmd === 'turnRight') {
                robot.dir = (robot.dir + 1) % 4;
                return true;
            }
            if (cmd === 'uTurn') {
                robot.dir = (robot.dir + 2) % 4;
                return true;
            }
            
            let newX = robot.x;
            let newY = robot.y;

            if (cmd === 'smash') {
                let targetX = robot.x + dx;
                let targetY = robot.y + dy;
                for (let i = 0; i < activeBreakables.length; i++) {
                    if (activeBreakables[i].x === targetX && activeBreakables[i].y === targetY) {
                        activeBreakables.splice(i, 1);
                        break;
                    }
                }
                return true;
            }

            if (cmd === 'moveForward') {
                newX += dx;
                newY += dy;
            }
            if (cmd === 'moveBackward') {
                newX -= dx;
                newY -= dy;
            }
            if (cmd === 'jump') {
                newX += dx * 2;
                newY += dy * 2;
            }

            // Check boundaries
            if (newX < 0 || newX >= gridSize || newY < 0 || newY >= gridSize) {
                return false;
            }

            // Check obstacles
            if (mapData.obstacles) {
                for (let obs of mapData.obstacles) {
                    if (obs.x === newX && obs.y === newY) return false;
                }
            }
            for (let obs of activeBreakables) {
                if (obs.x === newX && obs.y === newY) return false;
            }

            robot.x = newX;
            robot.y = newY;

            // Check stars
            for (let i = 0; i < activeStars.length; i++) {
                if(activeStars[i].x === robot.x && activeStars[i].y === robot.y) {
                    activeStars.splice(i, 1);
                    updateStarUI();
                    break;
                }
            }

            // Check portals
            if (mapData.portals) {
                for (let p of mapData.portals) {
                    if (p.x === robot.x && p.y === robot.y) {
                        robot.x = p.destX;
                        robot.y = p.destY;
                        break;
                    }
                }
            }

            return true;
        }

        function checkGoal() {
            return robot.x === mapData.goal.x && robot.y === mapData.goal.y && activeStars.length === 0;
        }

        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status-overlay visible ' + type;
        }

        function hideStatus() {
            statusEl.className = 'status-overlay';
        }

        // Drawing / Rendering
        function draw() {
            // Clear
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }

            // Draw Goal
            if (activeStars.length > 0) {
                ctx.fillStyle = '#fca5a5'; // Reddish, locked
            } else {
                ctx.fillStyle = '#bbf7d0'; // Green, open
            }
            ctx.fillRect(mapData.goal.x * tileSize + 2, mapData.goal.y * tileSize + 2, tileSize - 4, tileSize - 4);
            ctx.font = `${tileSize * 0.6}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let goalEmoji = activeStars.length > 0 ? '🔒' : '🏁';
            ctx.fillText(goalEmoji, mapData.goal.x * tileSize + tileSize/2, mapData.goal.y * tileSize + tileSize/2);

            // Draw Portals
            if (mapData.portals) {
                ctx.font = `${tileSize * 0.7}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (let p of mapData.portals) {
                    ctx.fillText('🌀', p.x * tileSize + tileSize/2, p.y * tileSize + tileSize/2);
                }
            }

            // Draw Stars
            for (let s of activeStars) {
                ctx.fillText('⭐', s.x * tileSize + tileSize/2, s.y * tileSize + tileSize/2);
            }

            // Draw Obstacles
            ctx.fillStyle = '#475569';
            if (mapData.obstacles) {
                for (let obs of mapData.obstacles) {
                    ctx.fillRect(obs.x * tileSize + 2, obs.y * tileSize + 2, tileSize - 4, tileSize - 4);
                    ctx.fillStyle = '#334155';
                    ctx.fillRect(obs.x * tileSize + 10, obs.y * tileSize + 10, tileSize - 20, tileSize - 20); // Inner crate detail
                    ctx.fillStyle = '#475569';
                }
            }

            // Draw Breakables
            ctx.fillStyle = '#8B4513';
            for (let obs of activeBreakables) {
                ctx.fillRect(obs.x * tileSize + 2, obs.y * tileSize + 2, tileSize - 4, tileSize - 4);
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obs.x * tileSize + 2, obs.y * tileSize + 2);
                ctx.lineTo((obs.x+1) * tileSize - 2, (obs.y+1) * tileSize - 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo((obs.x+1) * tileSize - 2, obs.y * tileSize + 2);
                ctx.lineTo(obs.x * tileSize + 2, (obs.y+1) * tileSize - 2);
                ctx.stroke();
            }

            // Draw Robot
            ctx.save();
            ctx.translate(robot.x * tileSize + tileSize/2, robot.y * tileSize + tileSize/2);
            // Rotate canvas based on direction (0=Up, 1=Right, 2=Down, 3=Left)
            ctx.rotate(robot.dir * Math.PI / 2);
            
            // Robot Body
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.roundRect(-tileSize/3, -tileSize/3, tileSize/1.5, tileSize/1.5, 8);
            ctx.fill();
            
            // Robot Eye/Front indicator
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -tileSize/4, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0ea5e9';
            ctx.beginPath();
            ctx.arc(0, -tileSize/4, 3, 0, Math.PI * 2);
            ctx.fill();

            // Tires
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-tileSize/2.5, -tileSize/4, 8, tileSize/2);
            ctx.fillRect(tileSize/2.5 - 8, -tileSize/4, 8, tileSize/2);

            ctx.restore();
        }

        // Init
        initLevels();
        loadLevel();

    </script>
