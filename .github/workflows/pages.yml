name: Deploy static site to GitHub Pages (gh-pages)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node (for potential build steps)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Copy site to deploy directory
        run: |
          rm -rf ./deploy
          mkdir -p ./deploy
          cp -r index.html CNAME images videos ./deploy/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
