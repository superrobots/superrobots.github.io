name: Deploy static site to GitHub Pages (gh-pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prepare deploy files
        run: |
          rm -rf ./deploy
          mkdir -p ./deploy
          cp -r src/* ./deploy/

      - name: Copy deploy files to repo root
        run: |
          # Clean repository root (preserve .github and README/CNAME if present)
          shopt -s extglob || true
          find . -maxdepth 1 -mindepth 1 \( -name '.github' -o -name '.git' -o -name 'README' -o -name 'README.md' -o -name 'CNAME' \) -prune -o -exec rm -rf {} + || true
          cp -r deploy/* ./

      - name: Commit and push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          # commit with [skip ci] to avoid triggering another workflow run
          git commit -m "Deploy site: update site content [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
